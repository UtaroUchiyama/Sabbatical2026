<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サバティカルの記録</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">サバティカルの記録</h1>
      <p class="site-subtitle">2026年 — 西日本をめぐる旅</p>
    </div>
  </header>

  <main>
    <section class="intro">
      <p>サバティカル休暇を使い、四国・九州・屋久島・中国地方を旅した記録です。</p>
    </section>

    <section class="destinations">
      <h2 class="section-title">訪問地</h2>
      <div class="card-grid">

        <a href="shikoku.html" class="card">
          <div class="card-image" style="background-image: url('images/shikoku/cover.jpg')">
            <div class="card-overlay">
              <span class="card-region">四国</span>
            </div>
          </div>
          <div class="card-body">
            <h3>四国</h3>
            <p>お遍路の道、四万十川、道後温泉…</p>
          </div>
        </a>

        <a href="kyushu.html" class="card">
          <div class="card-image" style="background-image: url('images/kyushu/cover.jpg')">
            <div class="card-overlay">
              <span class="card-region">九州</span>
            </div>
          </div>
          <div class="card-body">
            <h3>九州</h3>
            <p>阿蘇のカルデラ、長崎の歴史、温泉地…</p>
          </div>
        </a>

        <a href="yakushima.html" class="card">
          <div class="card-image" style="background-image: url('images/yakushima/cover.jpg')">
            <div class="card-overlay">
              <span class="card-region">屋久島</span>
            </div>
          </div>
          <div class="card-body">
            <h3>屋久島</h3>
            <p>縄文杉、苔むす原生林、山と海の島…</p>
          </div>
        </a>

        <a href="chugoku.html" class="card">
          <div class="card-image" style="background-image: url('images/chugoku/cover.jpg')">
            <div class="card-overlay">
              <span class="card-region">中国地方</span>
            </div>
          </div>
          <div class="card-body">
            <h3>中国地方</h3>
            <p>出雲大社、宮島、鳥取砂丘…</p>
          </div>
        </a>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 サバティカルの記録</p>
  </footer>
</body>
</html>
